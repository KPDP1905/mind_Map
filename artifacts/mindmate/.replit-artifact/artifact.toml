kind = "web"
previewPath = "/"
title = "MindMate AI"
version = "1.0.0"
id = "artifacts/mindmate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20014

[services.development]
run = "pnpm --filter @workspace/mindmate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mindmate", "run", "build" ]
publicDir = "artifacts/mindmate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20014"
BASE_PATH = "/"
